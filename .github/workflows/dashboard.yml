name: Dashboard
on:
  schedule:
    - cron: '0 6 * * *'
  issues:
    types: [opened, closed, labeled, unlabeled]
  pull_request_target:
    types: [opened, closed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: read
  pull-requests: read

concurrency:
  group: dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: .github/dashboard
        run: npm ci
      - name: Generate dashboard
        working-directory: .github/dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx src/generate.ts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .github/dashboard/site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
